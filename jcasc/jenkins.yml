jenkins:
  systemMessage: "Detent Automation Platform"
  numExecutors: 0
  labelString: ""

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    projectMatrix:
      entries:
        - group:
            name: "authenticated"
            permissions:
              - "Overall/Read"
              - "Job/Read"
              - "Job/Build"
              - "Job/Cancel"
        - user:
            name: "admin"
            permissions:
              - "Overall/Administer"

  clouds:
    - ecs:
        name: "detent-ecs"
        credentialsId: ""
        cluster: "${ECS_CLUSTER_ARN}"
        regionName: "${AWS_REGION}"
        jenkinsUrl: "${JENKINS_URL}"
        templates:
          - label: "detent-agent"
            templateName: "detent-agent"
            image: "${AGENT_IMAGE}"
            launchType: "FARGATE"
            networkMode: "awsvpc"
            subnets: "${AGENT_SUBNET_IDS}"
            securityGroups: "${AGENT_SECURITY_GROUP_ID}"
            assignPublicIp: false
            executionRole: "${AGENT_EXECUTION_ROLE_ARN}"
            taskrole: "${AGENT_TASK_ROLE_ARN}"
            cpu: 256
            memoryReservation: 512
            logDriver: "awslogs"
            logDriverOptions:
              - name: "awslogs-group"
                value: "/ecs/detent-jenkins-agent"
              - name: "awslogs-region"
                value: "${AWS_REGION}"
              - name: "awslogs-stream-prefix"
                value: "agent"

  remotingSecurity:
    enabled: true

unclassified:
  location:
    url: "${JENKINS_URL}"
    adminAddress: "detent-admin@example.com"

jobs:
  - script: |
      pipelineJob('seed') {
        description('Reads pipeline manifests and creates all jobs. Run after fresh deploy or when pipelines change.')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${DETENT_PIPELINES_REPO_URL}')
                }
                branches('*/master')
              }
            }
            scriptPath('Jenkinsfile.seed')
          }
        }
      }
